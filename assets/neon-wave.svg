<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Nxrskyaa contribution wave</title>
  <desc id="desc">Animated neon wave divider.</desc>
  <defs>
    <linearGradient id="wave" x1="0" y1="0" x2="1000" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F5FF"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#39FF88"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes dash { to { stroke-dashoffset: -1200; } }
      @keyframes pulse { 0%,100% { opacity:.35; } 50% { opacity:1; } }
      .dash { stroke-dasharray: 22 18; animation: dash 13s linear infinite; }
      .pulse { animation: pulse 2.5s ease-in-out infinite; }
      text { font: 900 24px 'Segoe UI', Inter, system-ui, sans-serif; letter-spacing: 5px; }
    </style>
  </defs>
  <rect width="1000" height="260" rx="28" fill="#070B18"/>
  <path d="M0 130C125 30 250 230 375 130C500 30 625 230 750 130C875 30 1000 230 1125 130" stroke="url(#wave)" stroke-width="7" stroke-linecap="round" class="dash" filter="url(#glow)"/>
  <path d="M0 160C125 60 250 260 375 160C500 60 625 260 750 160C875 60 1000 260 1125 160" stroke="url(#wave)" stroke-width="3" stroke-linecap="round" opacity="0.5" class="dash"/>
  <circle cx="160" cy="89" r="9" fill="#00F5FF" class="pulse"/>
  <circle cx="500" cy="130" r="12" fill="#A855F7" class="pulse"/>
  <circle cx="842" cy="170" r="9" fill="#39FF88" class="pulse"/>
  <text x="500" y="226" fill="#EAFBFF" text-anchor="middle">SHIP • LEARN • LOOP • LEVEL UP</text>
</svg>
